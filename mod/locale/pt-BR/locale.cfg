[mod-setting-name]
no-dead-trees-refresh-interval=Intervalo de atualização (segundos)
no-dead-trees-debug-logging=Registro de depuração

[mod-setting-description]
no-dead-trees-refresh-interval=Com que frequência as árvores rastreadas são verificadas e atualizadas, em segundos. O mínimo é 1 segundo e o máximo é 1 hora.
no-dead-trees-debug-logging=Ativa o registro detalhado no chat para solução de problemas.
