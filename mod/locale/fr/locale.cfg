[mod-setting-name]
no-dead-trees-refresh-interval=Intervalle de rafraîchissement (secondes)
no-dead-trees-debug-logging=Journal de débogage

[mod-setting-description]
no-dead-trees-refresh-interval=À quelle fréquence les arbres suivis sont vérifiés et rafraîchis, en secondes. Le minimum est de 1 seconde et le maximum d'1 heure.
no-dead-trees-debug-logging=Active la journalisation détaillée dans le chat pour le dépannage.
