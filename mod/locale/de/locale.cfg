[mod-setting-name]
no-dead-trees-refresh-interval=Aktualisierungsintervall (Sekunden)
no-dead-trees-debug-logging=Debug-Protokollierung

[mod-setting-description]
no-dead-trees-refresh-interval=Wie oft verfolgte Bäume geprüft und aktualisiert werden, in Sekunden. Minimum ist 1 Sekunde und Maximum ist 1 Stunde.
no-dead-trees-debug-logging=Aktiviert ausführliche Chat-Protokollierung zur Fehlersuche.
