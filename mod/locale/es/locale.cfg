[mod-setting-name]
no-dead-trees-refresh-interval=Intervalo de actualización (segundos)
no-dead-trees-debug-logging=Registro de depuración

[mod-setting-description]
no-dead-trees-refresh-interval=Cada cuántos segundos se comprueban y actualizan los árboles rastreados. El mínimo es 1 segundo y el máximo es 1 hora.
no-dead-trees-debug-logging=Activa el registro detallado en el chat para solucionar problemas.
