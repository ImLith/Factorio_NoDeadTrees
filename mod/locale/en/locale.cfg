[mod-setting-description]
no-dead-trees-refresh-interval=How often tracked trees are checked and refreshed, in seconds. Minimum is 1 second and maximum is 1 hour.
no-dead-trees-debug-logging=Enable verbose chat logging for troubleshooting.
